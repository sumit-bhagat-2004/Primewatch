services:
  postgres:
    image: postgres:15-alpine
    container_name: primewatch_db
    environment:
      POSTGRES_USER: primewatch_user
      POSTGRES_PASSWORD: primewatch_pass
      POSTGRES_DB: primewatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primewatch_user -d primewatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: primewatch_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://primewatch_user:primewatch_pass@postgres:5432/primewatch_db
      SECRET_KEY: your_super_secret_jwt_key_change_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
